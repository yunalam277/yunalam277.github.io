<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#F3EFF1;
display:flex;
justify-content:center;
padding:40px 20px;
}

.container{
background:#FAFAFA;
max-width:920px;
width:100%;
padding:50px;
border-radius:35px;
box-shadow:0 8px 24px rgba(0,0,0,.06);
}

h1{
font-size:54px;
color:#26356E;
text-align:center;
margin-bottom:12px;
}

.subtitle{
text-align:center;
color:#7C7C7C;
margin-bottom:28px;
}

.divider{
width:90px;
height:5px;
background:#D6A5B3;
border-radius:30px;
margin:0 auto 40px;
}

.word-card{
background:#F0ECEE;
padding:34px;
border-radius:28px;
margin-bottom:22px;
}

.chinese{
font-size:56px;
font-weight:700;
color:#26356E;
}

.pinyin{
font-size:20px;
color:#D38FA1;
margin:8px 0;
}

.meaning{
font-size:18px;
color:#444;
}

.quiz{
background:#26356E;
padding:35px;
border-radius:30px;
margin-top:35px;
color:white;
}

.option{
display:block;
width:100%;
padding:16px;
margin:14px 0;
border:none;
border-radius:18px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:15px;
font-size:22px;
font-weight:600;
}

.back{
display:block;
text-align:center;
margin-top:30px;
text-decoration:none;
color:#999;
}
</style>
</head>

<body>

<div class="container">

<h1>第五课 日常生活</h1>

<p class="subtitle">
Lesson 5 • Daily Life
</p>

<div class="divider"></div>

<div class="word-card">
<div class="chinese">吃</div>
<div class="pinyin">chī</div>
<div class="meaning">Ăn</div>
</div>

<div class="word-card">
<div class="chinese">喝</div>
<div class="pinyin">hē</div>
<div class="meaning">Uống</div>
</div>

<div class="word-card">
<div class="chinese">看</div>
<div class="pinyin">kàn</div>
<div class="meaning">Xem / Nhìn</div>
</div>

<div class="word-card">
<div class="chinese">去</div>
<div class="pinyin">qù</div>
<div class="meaning">Đi</div>
</div>

<div class="word-card">
<div class="chinese">来</div>
<div class="pinyin">lái</div>
<div class="meaning">Đến</div>
</div>

<div class="quiz">

<h2>Mini Quiz ☀️</h2>

<p>“喝” nghĩa là gì?</p>

<button class="option" onclick="checkAnswer(false)">A. Ăn</button>
<button class="option" onclick="checkAnswer(true)">B. Uống</button>
<button class="option" onclick="checkAnswer(false)">C. Đi</button>

<p id="result"></p>

</div>

<a class="back" href="vocab-hsk1.html">
← Quay lại HSK1 Vocabulary
</a>

</div>

<script>
function checkAnswer(correct){
const result=document.getElementById("result");
if(correct){
result.innerHTML="✅ Chính xác!";
result.style.color="#7CFF92";
}else{
result.innerHTML="❌ Thử lại nhé!";
result.style.color="#FF8F8F";
}}
</script>
